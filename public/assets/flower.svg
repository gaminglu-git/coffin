<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Stiel & Blätter -->
  <path d="M50 95 L50 45" stroke="#788a80" stroke-width="3" stroke-linecap="round"/>
  <path d="M50 75 Q30 75 35 55 Q50 65 50 75" fill="#99aba0"/>
  <path d="M50 65 Q70 65 65 45 Q50 55 50 65" fill="#99aba0"/>
  
  <!-- Blütenblätter (5-fach rotiert für perfekten Flat-Look) -->
  <g fill="#a6b5c4">
    <path d="M50 45 C30 35, 35 10, 50 5 C65 10, 70 35, 50 45" />
    <path d="M50 45 C30 35, 35 10, 50 5 C65 10, 70 35, 50 45" transform="rotate(72 50 45)" />
    <path d="M50 45 C30 35, 35 10, 50 5 C65 10, 70 35, 50 45" transform="rotate(144 50 45)" />
    <path d="M50 45 C30 35, 35 10, 50 5 C65 10, 70 35, 50 45" transform="rotate(216 50 45)" />
    <path d="M50 45 C30 35, 35 10, 50 5 C65 10, 70 35, 50 45" transform="rotate(288 50 45)" />
  </g>
  
  <!-- Innere Akzente -->
  <g fill="#8c9eb0">
    <path d="M50 45 C42 38, 44 20, 50 15 C56 20, 58 38, 50 45" />
    <path d="M50 45 C42 38, 44 20, 50 15 C56 20, 58 38, 50 45" transform="rotate(72 50 45)" />
    <path d="M50 45 C42 38, 44 20, 50 15 C56 20, 58 38, 50 45" transform="rotate(144 50 45)" />
    <path d="M50 45 C42 38, 44 20, 50 15 C56 20, 58 38, 50 45" transform="rotate(216 50 45)" />
    <path d="M50 45 C42 38, 44 20, 50 15 C56 20, 58 38, 50 45" transform="rotate(288 50 45)" />
  </g>

  <!-- Zentrum -->
  <circle cx="50" cy="45" r="9" fill="#c2a878"/>
  <circle cx="47" cy="42" r="2.5" fill="#a68d5c" opacity="0.8"/>
  
  <!-- Partikel im Hintergrund -->
  <circle cx="20" cy="20" r="2" fill="#b8c5d1" opacity="0.7"/>
  <circle cx="80" cy="25" r="1.5" fill="#b8c5d1" opacity="0.7"/>
  <circle cx="25" cy="70" r="1.5" fill="#b8c5d1" opacity="0.7"/>
  <circle cx="85" cy="65" r="2" fill="#b8c5d1" opacity="0.7"/>
</svg>