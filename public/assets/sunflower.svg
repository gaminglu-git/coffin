  <!-- Großes Zentrum (Sonnenblumen-Stil) -->
  <circle cx="50" cy="50" r="14" fill="#8c7a7e"/>
  <circle cx="50" cy="50" r="11" fill="#6b5a5e"/>
  <circle cx="50" cy="50" r="7" fill="#524447"/>
  
