  <circle cx="55" cy="50" r="1" fill="#8c7a7e"/>
  <circle cx="50" cy="55" r="1" fill="#8c7a7e"/>
  <circle cx="46.5" cy="46.5" r="0.8" fill="#8c7a7e"/>
  <circle cx="53.5" cy="46.5" r="0.8" fill="#8c7a7e"/>
  <circle cx="46.5" cy="53.5" r="0.8" fill="#8c7a7e"/>
  <circle cx="53.5" cy="53.5" r="0.8" fill="#8c7a7e"/>
