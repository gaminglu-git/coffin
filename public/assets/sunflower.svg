    <path d="M50 50 C42 30, 46 12, 50 5 C54 12, 58 30, 50 50" transform="rotate(247.5 50 50)" />
    <path d="M50 50 C42 30, 46 12, 50 5 C54 12, 58 30, 50 50" transform="rotate(292.5 50 50)" />
    <path d="M50 50 C42 30, 46 12, 50 5 C54 12, 58 30, 50 50" transform="rotate(337.5 50 50)" />
